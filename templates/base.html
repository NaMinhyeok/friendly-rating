{% load static %}
<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#fff8f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="우리 사이">
    <meta name="application-name" content="우리 사이">
    <meta name="description" content="우리 둘만의 따뜻한 마음 기록">
    <meta name="robots" content="noindex,nofollow">
    <title>{% block title %}우리 사이{% endblock %}</title>
    <link rel="manifest" href="{% static 'ratings/manifest.webmanifest' %}">
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'ratings/icons/icon-192.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'ratings/icons/apple-touch-icon.png' %}">
    <link rel="stylesheet" href="{% static 'ratings/app.css' %}">
    <script defer src="{% static 'ratings/toast.js' %}"></script>
    <script defer src="{% static 'ratings/app.js' %}"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <div class="ambient ambient--one" aria-hidden="true"></div>
    <div class="ambient ambient--two" aria-hidden="true"></div>
    <div
        data-toast-region
        role="status"
        aria-live="polite"
        aria-atomic="true"
    ></div>
    {% block content %}{% endblock %}
    {% block extra_scripts %}{% endblock %}
</body>
</html>
