name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      DEBUG: "1"
      SECRET_KEY: django-insecure-ci-only
      PUSH_NOTIFICATIONS_ENABLED: "0"
      HARNESS_DATABASE_URL: postgresql://friendly_rating:friendly_rating@127.0.0.1:5432/friendly_rating
      HARNESS_MIGRATION_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: friendly_rating
          POSTGRES_USER: friendly_rating
          POSTGRES_PASSWORD: friendly_rating
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U friendly_rating -d friendly_rating"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run repository checks
        run: make check
