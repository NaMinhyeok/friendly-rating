<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff8f1">
  <title>잠시 연결이 쉬고 있어요 · 우리 사이</title>
  <style>
    :root { color-scheme: light; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif; }
    * { box-sizing: border-box; }
    body {
      display: grid;
      min-width: 320px;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      place-items: center;
      padding:
        max(1.5rem, env(safe-area-inset-top))
        max(1.25rem, env(safe-area-inset-right))
        max(1.5rem, env(safe-area-inset-bottom))
        max(1.25rem, env(safe-area-inset-left));
      color: #392d2a;
      background: radial-gradient(circle at 50% 20%, #ffe0d8, transparent 20rem), #fff8f1;
      text-align: center;
    }
    main {
      width: min(100%, 25rem);
      padding: 2rem 1.4rem;
      border: 1px solid #ecded5;
      border-radius: 1.5rem;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 18px 55px rgba(93, 62, 50, 0.1);
    }
    .heart { color: #e86758; font-size: 2.7rem; }
    h1 { margin: 0.6rem 0 0; font-size: 1.45rem; letter-spacing: -0.04em; }
    p { margin: 0.6rem 0 1.4rem; color: #806f68; font-size: 0.9rem; line-height: 1.65; }
    button {
      width: 100%;
      min-height: 3.2rem;
      border: 0;
      border-radius: 0.95rem;
      color: #fff;
      background: #e86758;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <div class="heart" aria-hidden="true">♡</div>
    <h1>잠시 연결이 쉬고 있어요</h1>
    <p>인터넷 연결을 확인한 뒤 다시 열어 주세요.<br>마음 기록은 연결되면 안전하게 남길 수 있어요.</p>
    <button type="button" onclick="window.location.reload()">다시 연결하기</button>
  </main>
</body>
</html>
